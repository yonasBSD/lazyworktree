name: Weekly Go Dependency Update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-go-get-update
  cancel-in-progress: false

jobs:
  update-go-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Require automation token
        env:
          AUTOMATION_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$AUTOMATION_TOKEN" ]; then
            echo "GH_TOKEN is required."
            echo "Use a fine-grained PAT or GitHub App token with contents and pull requests access."
            echo "The default GITHUB_TOKEN cannot reliably trigger the PR CI required for auto-merge."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Update Go dependencies
        run: |
          go get -u ./...
          go mod tidy

      - name: Create pull request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: ci/weekly-go-get-update
          delete-branch: true
          commit-message: "chore(deps): update Go dependencies"
          title: "chore(deps): weekly Go dependency update"
          body: |
            ## Summary

            - ran `go get -u ./...`
            - ran `go mod tidy`

            This PR was opened automatically by the weekly dependency update workflow.
          labels: |
            dependencies
          add-paths: |
            go.mod
            go.sum

      - name: Enable auto-merge
        if: ${{ steps.create-pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
